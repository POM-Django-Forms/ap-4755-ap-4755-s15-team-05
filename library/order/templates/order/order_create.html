<!DOCTYPE html>
<html>
<head>
    <title>Create Order</title>
</head>
<body>
    <h1>Create Order</h1>

    <a href="{% url 'my_orders' %}">Back to my orders</a>

    {% for message in messages %}
        <p>{{ message }}</p>
    {% endfor %}

    <form method="post">
        {% csrf_token %}

        <label>Book:</label><br>
        <select name="book_id" required>
            {% for book in books %}
                <option value="{{ book.id }}">{{ book.name }}</option>
            {% endfor %}
        </select><br><br>

        <label>Planned end timestamp:</label><br>
        <input type="number" name="plated_end_at"><br><br>

        <button type="submit">Create order</button>
    </form>
</body>
</html>
