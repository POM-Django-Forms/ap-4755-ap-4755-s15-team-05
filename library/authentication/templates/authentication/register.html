<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>
    <h1>Register</h1>

    {% for message in messages %}
        <p>{{ message }}</p>
    {% endfor %}

    <form method="post">
        {% csrf_token %}

        {{ form.as_p  }}

        <button type="submit">Register</button>
    </form>

    <br>
    <a href="{% url 'login' %}">Login</a>
</body>
</html>
