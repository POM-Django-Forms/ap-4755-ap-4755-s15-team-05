<!DOCTYPE html>
<html>
<head>
    <title>Users</title>
</head>
<body>
    <h1>Users</h1>

    <a href="{% url 'home' %}">Home</a>

    <ul>
        {% for user in users %}
            <li>
                <a href="{% url 'user_detail' user.id %}">
                    {{ user.email }}
                </a>
                | Role: {{ user.get_role_name }}

                <a href="{% url 'books_by_user' user.id %}">
                    Books
                </a>
            </li>
        {% empty %}
            <li>No users</li>
        {% endfor %}
    </ul>
</body>
</html>
