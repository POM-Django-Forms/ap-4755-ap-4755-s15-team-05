<!DOCTYPE html>
<html>
<head>
    <title>Book detail</title>
</head>
<body>
    <h1>{{ book.name }}</h1>

    <a href="{% url 'book_list' %}">Back to books</a>

    <p><b>Description:</b> {{ book.description }}</p>
    <p><b>Count:</b> {{ book.count }}</p>

    <p><b>Authors:</b></p>
    <ul>
        {% for author in book.authors.all %}
            <li>{{ author.name }} {{ author.surname }} {{ author.patronymic }}</li>
        {% empty %}
            <li>No authors</li>
        {% endfor %}
    </ul>
</body>
</html>
